<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUSTHAVEN Poetry Engine</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #111111;
            --border-color: #222222;
            --accent-color: #e5e5e5;
            --text-muted: #888888;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Grunge Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2;
            pointer-events: none;
            z-index: 100;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            padding: 40px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header {
            margin-bottom: 30px;
            border-left: 4px solid var(--accent-color);
            padding-left: 20px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        /* Grid System for Controls */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        input, select {
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            padding: 12px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #444;
            background: #222;
        }

        .theme-input-wrapper {
            display: flex;
            gap: 5px;
        }

        .btn-icon {
            background: #1a1a1a;
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            padding: 0 15px;
            cursor: pointer;
        }

        .btn-icon:hover {
            background: #222;
        }

        /* Action Buttons */
        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        .btn-primary {
            flex: 2;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 15px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            transition: transform 0.1s active;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            flex: 1;
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            text-transform: uppercase;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }

        /* Output Area */
        .output-container {
            border-top: 1px dashed var(--border-color);
            padding-top: 40px;
            min-height: 200px;
            position: relative;
        }

        #poetry-display {
            font-family: var(--font-mono);
            line-height: 1.8;
            font-size: 1.1rem;
            white-space: pre-wrap;
            color: #ddd;
            font-style: italic;
        }

        .typing::after {
            content: "|";
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .copy-toast {
            position: absolute;
            top: 10px;
            right: 0;
            font-size: 0.7rem;
            color: #4CAF50;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* Responsive Fixes */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Rusthaven</h1>
            <p class="subtitle">CORE POETRY ENGINE // VER 4.0.0</p>
        </header>

        <div class="controls">
            <div class="input-group" style="grid-column: span 2;">
                <label>Concept / Theme</label>
                <div class="theme-input-wrapper">
                    <input type="text" id="theme-input" placeholder="e.g. Iron and Blood, Silent Echoes...">
                    <button class="btn-icon" id="random-theme-btn" title="Randomize Theme">🎲</button>
                </div>
            </div>

            <div class="input-group">
                <label>Genre</label>
                <select id="genre-select">
                    <option value="romantic">Romantic</option>
                    <option value="dark">Dark</option>
                    <option value="philosophical">Philosophical</option>
                    <option value="grunge">Grunge</option>
                    <option value="existential">Existential</option>
                    <option value="abstract">Abstract</option>
                </select>
            </div>

            <div class="input-group">
                <label>Language</label>
                <select id="lang-select">
                    <option value="en">English</option>
                    <option value="id">Indonesian</option>
                </select>
            </div>

            <div class="input-group">
                <label>Structure</label>
                <select id="length-select">
                    <option value="short">Short (4 Lines)</option>
                    <option value="medium" selected>Medium (8 Lines)</option>
                    <option value="long">Long (14+ Lines)</option>
                </select>
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" id="generate-btn">Execute Generation</button>
            <button class="btn-secondary" id="copy-btn">Copy to Clipboard</button>
        </div>

        <div class="output-container">
            <span class="copy-toast" id="copy-toast">COPIED TO SYSTEM</span>
            <div id="poetry-display">Initialize system... awaiting input...</div>
        </div>
    </div>

    <script>
        /**
         * RUSTHAVEN ENGINE LOGIC
         * A dynamic word-bank based generator with semantic logic
         */

        const DATA = {
            en: {
                themes: ["Obsidian rain", "Forgotten circuits", "Velvet rot", "Neon ghosts", "Shattered geometry", "Industrial silence"],
                genres: {
                    romantic: {
                        opening: ["Your pulse is a", "In the orbit of", "Between our"],
                        middle: ["A symphony of", "Fragile as", "Tethered to"],
                        closing: ["And we burn.", "Forever in stasis.", "Endless rhythm."],
                        words: ["breath", "star", "skin", "shadows", "gold", "woven", "tenderness", "whisper"]
                    },
                    dark: {
                        opening: ["The rot begins in", "Cold iron against", "Shadows swallow the"],
                        middle: ["Bleeding through", "Sharp as", "Heavy with"],
                        closing: ["No light returns.", "Silence screams.", "The void is full."],
                        words: ["bone", "hollow", "void", "ash", "blood", "rust", "crows", "severed"]
                    },
                    philosophical: {
                        opening: ["Time is but a", "The concept of", "Truth resides in"],
                        middle: ["Measuring the", "Defined by", "Beyond the"],
                        closing: ["Only logic remains.", "The cycle restarts.", "Everything is nothing."],
                        words: ["paradox", "atom", "infinite", "entropy", "void", "mirror", "thought", "origin"]
                    },
                    grunge: {
                        opening: ["Stained concrete and", "Broken needles of", "The basement smells of"],
                        middle: ["Drowning in", "Static and", "Chewing on"],
                        closing: ["Just noise.", "Burn out.", "Nothing works here."],
                        words: ["dirt", "smoke", "gray", "grit", "asphalt", "oil", "poison", "garage"]
                    },
                    existential: {
                        opening: ["Searching for a", "Why does the", "We are simply"],
                        middle: ["Lost inside", "Without a", "Falling through"],
                        closing: ["Existence fades.", "Who am I?", "The end is near."],
                        words: ["purpose", "breath", "void", "flesh", "meaningless", "awake", "specter", "dust"]
                    },
                    abstract: {
                        opening: ["Blue sounds of", "Squares leaking", "Vertical"],
                        middle: ["Intersecting", "Colliding with", "Transparent"],
                        closing: ["Shift.", "Dissolve.", "Pattern broken."],
                        words: ["frequency", "static", "prism", "angle", "vibration", "ink", "fractal", "void"]
                    }
                }
            },
            id: {
                themes: ["Hujan obsidian", "Sirkuit terlupakan", "Busuk beludru", "Hantu neon", "Geometri hancur", "Keheningan industri"],
                genres: {
                    romantic: {
                        opening: ["Denyutmu adalah", "Dalam orbit", "Di antara"],
                        middle: ["Simfoni dari", "Rapuh bagai", "Terbelenggu pada"],
                        closing: ["Dan kita terbakar.", "Abadi dalam diam.", "Ritme tanpa akhir."],
                        words: ["napas", "bintang", "kulit", "bayangan", "emas", "teranyam", "kelembutan", "bisikan"]
                    },
                    dark: {
                        opening: ["Pembusukan bermula di", "Besi dingin pada", "Bayangan menelan"],
                        middle: ["Berdarah melalui", "Tajam bagai", "Berat dengan"],
                        closing: ["Tak ada cahaya.", "Hening yang berteriak.", "Ruang hampa penuh."],
                        words: ["tulang", "hampa", "kekosongan", "abu", "darah", "karat", "gagak", "terputus"]
                    },
                    philosophical: {
                        opening: ["Waktu hanyalah", "Konsep tentang", "Kebenaran bersemayam di"],
                        middle: ["Mengukur", "Didefinisikan oleh", "Melampaui"],
                        closing: ["Hanya logika tersisa.", "Siklus dimulai lagi.", "Segalanya adalah ketiadaan."],
                        words: ["paradoks", "atom", "tak terhingga", "entropi", "cermin", "pikiran", "asal-usul"]
                    },
                    grunge: {
                        opening: ["Beton bernoda dan", "Jarum-jarum patah", "Basement berbau"],
                        middle: ["Tenggelam dalam", "Statis dan", "Mengunyah"],
                        closing: ["Hanya kebisingan.", "Terbakar habis.", "Tak ada yang berfungsi."],
                        words: ["kotoran", "asap", "abu-abu", "pasir", "aspal", "minyak", "racun", "garasi"]
                    },
                    existential: {
                        opening: ["Mencari sebuah", "Mengapa", "Kita hanyalah"],
                        middle: ["Tersesat di dalam", "Tanpa sebuah", "Jatuh melalui"],
                        closing: ["Eksistensi memudar.", "Siapa aku?", "Akhir sudah dekat."],
                        words: ["tujuan", "napas", "hampa", "daging", "tak bermakna", "terbangun", "spektrum", "debu"]
                    },
                    abstract: {
                        opening: ["Suara biru dari", "Kotak yang bocor", "Vertikal"],
                        middle: ["Berpotongan", "Tabrakan dengan", "Transparan"],
                        closing: ["Bergeser.", "Larut.", "Pola hancur."],
                        words: ["frekuensi", "statis", "prisma", "sudut", "getaran", "tinta", "fraktal", "kosong"]
                    }
                }
            }
        };

        class PoetryEngine {
            constructor() {
                this.display = document.getElementById('poetry-display');
                this.themeInput = document.getElementById('theme-input');
                this.genreSelect = document.getElementById('genre-select');
                this.langSelect = document.getElementById('lang-select');
                this.lengthSelect = document.getElementById('length-select');
                this.isTyping = false;
            }

            getRandom(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            generateLine(genreData, theme) {
                const patterns = [
                    () => `${this.getRandom(genreData.opening)} ${theme.toLowerCase()}.`,
                    () => `${this.getRandom(genreData.middle)} ${this.getRandom(genreData.words)} ${this.getRandom(genreData.words)}.`,
                    () => `${this.getRandom(genreData.words)} bertemu ${this.getRandom(genreData.words)}, ${this.getRandom(genreData.middle).toLowerCase()}.`,
                    () => `${theme} — ${this.getRandom(genreData.words)} yang ${this.getRandom(genreData.words)}.`
                ];
                return this.getRandom(patterns)();
            }

            async typeEffect(text) {
                this.isTyping = true;
                this.display.innerHTML = '';
                this.display.classList.add('typing');
                
                const lines = text.split('\n');
                for(let line of lines) {
                    let span = document.createElement('div');
                    this.display.appendChild(span);
                    for(let char of line) {
                        span.textContent += char;
                        await new Promise(r => setTimeout(r, 20));
                    }
                    this.display.appendChild(document.createElement('br'));
                }
                
                this.display.classList.remove('typing');
                this.isTyping = false;
            }

            generate() {
                if (this.isTyping) return;

                const lang = this.langSelect.value;
                const genre = this.genreSelect.value;
                const lenKey = this.lengthSelect.value;
                let theme = this.themeInput.value || this.getRandom(DATA[lang].themes);
                
                const genreData = DATA[lang].genres[genre];
                let poemLines = [];

                // Determine length
                let count = 4;
                if(lenKey === 'medium') count = 8;
                if(lenKey === 'long') count = 14;

                // Build Poem Logic
                poemLines.push(this.getRandom(genreData.opening) + " " + theme);
                
                for(let i = 0; i < count - 2; i++) {
                    poemLines.push(this.generateLine(genreData, theme));
                }

                poemLines.push(this.getRandom(genreData.closing));

                const finalPoem = poemLines.join('\n');
                this.typeEffect(finalPoem);
            }

            setRandomTheme() {
                const lang = this.langSelect.value;
                this.themeInput.value = this.getRandom(DATA[lang].themes);
            }

            copy() {
                const text = this.display.innerText;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);

                const toast = document.getElementById('copy-toast');
                toast.style.opacity = '1';
                setTimeout(() => toast.style.opacity = '0', 2000);
            }
        }

        // Initialize
        const engine = new PoetryEngine();

        document.getElementById('generate-btn').addEventListener('click', () => engine.generate());
        document.getElementById('random-theme-btn').addEventListener('click', () => engine.setRandomTheme());
        document.getElementById('copy-btn').addEventListener('click', () => engine.copy());

        // Initial Generation
        window.onload = () => {
            engine.generate();
        };
    </script>
</body>
</html>
